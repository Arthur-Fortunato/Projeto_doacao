<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página do Destinatário</title>
    <link rel="stylesheet" href="destinatario.css">
</head>
<body>
    <header>Área do Destinatário</header>

    <div class="container">
        <h2>Itens Disponíveis na Sua Região</h2>
        <div class="lista-itens">
            <div class="item">
                <span>📦 Arroz 5kg</span>
                <button>Solicitar</button>
            </div>
            <div class="item">
                <span>🧴 Kit de Higiene</span>
                <button>Solicitar</button>
            </div>
            <div class="item">
                <span>👕 Roupas de Inverno</span>
                <button>Solicitar</button>
            </div>
        </div>

        <div class="ranking">
            <h2>Instituições que Mais Recebem Doações</h2>
            <table>
                <tr>
                    <th>Posição</th>
                    <th>Instituição</th>
                    <th>Doações Recebidas</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Lar Esperança</td>
                    <td>120</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Casa da Criança</td>
                    <td>95</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Famílias Unidas</td>
                    <td>80</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
